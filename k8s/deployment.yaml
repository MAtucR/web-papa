apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-papa-deploy
  namespace: civil-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-papa
  template:
    metadata:
      labels:
        app: web-papa
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: web-papa-container
          image: ghcr.io/matucr/civil-engineer-web:latest  
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
