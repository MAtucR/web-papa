apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-papa-deploy     # Nombre estandarizado
  namespace: civil-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-papa         # Esta es la "llave"
  template:
    metadata:
      labels:
        app: web-papa
    spec:
      containers:
        - name: web-papa-container
          image: ghcr.io/matucr/web-papa:latest  # Tu imagen real
          ports:
            - containerPort: 80
