name: Build & Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'Dockerfile'
      - 'nginx.conf'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in deployment.yaml
        run: |
          IMAGE_TAG="ghcr.io/${{ github.repository_owner }}/$(basename ${{ github.repository }}):sha-${{ github.sha }}"
          sed -i "s|image: ghcr.io/.*|image: ${IMAGE_TAG}|g" k8s/deployment.yaml

      - name: Commit updated deployment.yaml
        uses: EndBug/add-and-commit@v9
        with:
          add: k8s/deployment.yaml
          message: "ci: update image tag to sha-${{ github.sha }} [skip ci]"
          default_author: github_actions
